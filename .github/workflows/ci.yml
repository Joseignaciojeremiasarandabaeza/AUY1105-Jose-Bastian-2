name: "Terraform CI/CD Unificado - Seguridad & Calidad"

on:
  push:
    branches:
      - main
      - automatización
      - codigo-infraestructura
      - politicas
  pull_request:
    branches:
      - main
      - automatización
      - codigo-infraestructura
      - politicas

jobs:
  lint-and-validate:
    name: "Lint & Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install TFLint
        run: curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      # Fix para el Error Exit Code 3: Primero formateamos, luego chequeamos
      - name: Terraform Format
        run: terraform fmt -recursive

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive

  security-and-compliance:
    name: "Security (Checkov) & Compliance (OPA)"
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Checkov
        run: pip3 install checkov

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Terraform Init & Plan JSON
        run: |
          terraform init -input=false
          terraform plan -out=tfplan -input=false
          terraform show -json tfplan > tfplan.json

      - name: Run Checkov (Falla si hay riesgos, excepto Academy)
        run: |
          # Se mantienen los skips para evitar fallos por limitaciones de AWS Academy
          checkov -f tfplan.json --skip-check CKV_AWS_158,CKV_AWS_338,CKV_AWS_290,CKV_AWS_355

      - name: OPA Policy Compliance Check
        run: |
          # 1. Check de SSH Público
          RESULT_SSH=$(opa eval -i tfplan.json -d terraform_ssh_policy.rego "data.terraform.ssh.allow" --format json)
          echo "$RESULT_SSH" | grep -q 'true' || (echo "ERROR: Acceso SSH público detectado." && exit 1)

          # 2. Check de Tipo de Instancia (t2.micro)
          RESULT_TYPE=$(opa eval -i tfplan.json -d terraform_instance_type.rego "data.terraform.instance.allow" --format json)
          echo "$RESULT_TYPE" | grep -q 'true' || (echo "ERROR: Solo se permiten instancias t2.micro." && exit 1)

          # 3. Check de Nombre y Región
          RESULT_NAME=$(opa eval -i tfplan.json -d terraform_name_check.rego "data.terraform.authz.allow" --format json)
          echo "$RESULT_NAME" | grep -q '"status":true' || (echo "ERROR: El nombre no cumple la nomenclatura." && exit 1)

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  deploy:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: security-and-compliance
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Upload State
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: terraform.tfstate

  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    needs: deploy
    environment: destroy-approval
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Download State
        uses: actions/download-artifact@v4
        with:
          name: terraform-state

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
