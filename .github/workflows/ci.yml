name: "Terraform CI/CD Unificado - Seguridad & Calidad"

on:
  push:
    branches:
      - main
      - automatización
      - codigo-infraestructura
      - politicas
  pull_request:
    branches:
      - main
      - automatización
      - codigo-infraestructura
      - politicas

jobs:
  lint-and-validate:
    name: "Lint & Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install TFLint
        run: curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Terraform Format
        run: terraform fmt -recursive

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -upgrade -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive

  security-and-compliance:
    name: "Security (Checkov) & Compliance (OPA)"
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Checkov
        run: pip3 install checkov

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Terraform Init & Plan JSON
        run: |
          terraform init -upgrade -input=false
          terraform plan -out=tfplan -input=false
          terraform show -json tfplan > tfplan.json

      - name: Run Checkov
        run: |
          checkov -f tfplan.json --skip-check CKV_AWS_158,CKV_AWS_338,CKV_AWS_290,CKV_AWS_355,CKV_AWS_135,CKV_AWS_126,CKV_AWS_382,CKV_AWS_130,CKV2_AWS_11,CKV2_AWS_12,CKV2_AWS_41

      - name: OPA Policy Compliance Check
        run: |
          RESULT_ANALYSIS=$(opa eval -i tfplan.json -d . "data.terraform.analysis.violation" --format json || echo "ERROR_OPA")
          if [ "$RESULT_ANALYSIS" == "ERROR_OPA" ]; then echo "Error de ejecución en OPA Analysis"; exit 1; fi
          echo "$RESULT_ANALYSIS" | grep -q '\[\]' || (echo "ERROR: Violación de política detectada (Tipo de instancia o Tags)." && exit 1)

          RESULT_NAME=$(opa eval -i tfplan.json -d . "data.terraform.authz.allow" --format json || echo "ERROR_OPA")
          if [ "$RESULT_NAME" == "ERROR_OPA" ]; then echo "Error de ejecución en OPA Authz"; exit 1; fi
          echo "$RESULT_NAME" | grep -q '"status":true' || (echo "ERROR: El nombre de la instancia no cumple la nomenclatura." && exit 1)

          RESULT_REGION=$(opa eval -i tfplan.json -d . "data.terraform_region_check.allow" --format json || echo "ERROR_OPA")
          if [ "$RESULT_REGION" == "ERROR_OPA" ]; then echo "Error de ejecución en OPA Region"; exit 1; fi
          echo "$RESULT_REGION" | grep -q 'true' || (echo "ERROR: La región configurada no es us-east-1." && exit 1)

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  deploy:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: security-and-compliance
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Init
        run: terraform init -upgrade -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Upload State
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: terraform.tfstate

  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    needs: deploy
    environment: destroy-approval
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Download State
        uses: actions/download-artifact@v4
        with:
          name: terraform-state

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -upgrade -input=false

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        run: terraform init -upgrade -input=false

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
